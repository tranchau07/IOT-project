spring:
  application:
    name: Iot-Project

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/identity_service}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://root:root@localhost:27017/hems_db?authSource=admin}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}

server:
  address: 0.0.0.0
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret-key: ${JWT_SECRET:Nfs1Gek09tLDLYg2bvUp7xgze89R1HILTVfe6beqFvEkSk9C68mtqE0xkFxrPrCi}
  expiration-hours: ${JWT_EXPIRATION_HOURS:1}
  issuer: ${JWT_ISSUER:IOT.com}

mqtt:
  server-uri: ${MQTT_SERVER_URI:tcp://broker.emqx.io:1883}
  username: ${MQTT_USERNAME:admin}
  password: ${MQTT_PASSWORD:123456789}
  client-id: ${MQTT_CLIENT_ID:iot_project_server}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://127.0.0.1:8081,http://10.145.52.236:8081}

